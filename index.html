}

function streak(h){
  if(h.length<2) return 0
  let last=h.at(-1),c=1
  for(let i=h.length-2;i>=0;i--){
    if(h[i]===last)c++
    else break
  }
  return clamp(c/6,0,1)
}

function swing(h){
  if(h.length<6) return 0
  let ch=0
  for(let i=1;i<h.length;i++) if(h[i]!=h[i-1]) ch++
  return clamp(ch/h.length,0,1)
}

// ===== CORE AI =====
function hyper(){
  let p=history.filter(x=>x==='P').length
  let b=history.filter(x=>x==='B').length
  let total=Math.max(1,history.length)

  let stP=p/total, stB=b/total

  let last5=history.slice(-5)
  let recP=last5.filter(x=>x==='P').length/Math.max(1,last5.length)
  let recB=last5.filter(x=>x==='B').length/Math.max(1,last5.length)

  let ent=entropy(history.slice(-20))
  let st=streak(history)
  let sw=swing(history)

  let vol=Math.abs(st-sw)
  let mom=clamp((recP-recB)+st-sw,-1,1)

  let sP=0.25*stP+0.15*recP+0.15*(1-ent/2)+0.15*Math.max(mom,0)
  let sB=0.25*stB+0.15*recB+0.15*(1-ent/2)+0.15*Math.max(-mom,0)

  let main=sP>=sB?'P':'B'
  let alt=main==='P'?'B':'P'

  let conf=clamp(Math.abs(sP-sB)*140+55+(1-vol)*20,55,99)

  return {main,alt,sP,sB,conf,ent,mom,vol}
}

// ===== SECONDARY =====
function secondary(d){
  let gap=Math.abs(d.sP-d.sB)
  let stability=(1-d.vol)
  let conf=clamp((0.5*(100-d.conf)/100 +0.3*stability+0.2*(1-gap))*100,40,90)
  return {pick:d.alt,conf}
}

// ===== ULTIMATE =====
function ultimate(d){
  let clarity=Math.abs(d.sP-d.sB)*150
  let stability=(1-d.vol)*100
  let score=0.35*clarity+0.3*stability+0.2*d.conf+0.15*(1.4-d.ent)*60
  score=clamp(score,45,99)
  return {pick:score>=65?d.main:d.alt,conf:score}
}

function finalDecision(d,u){

  if(d.main===u.pick){
    return {pick:d.main,conf:Math.max(d.conf,u.conf)}
  }

  if(u.conf-d.conf>=7){
    return {pick:u.pick,conf:u.conf}
  }

  return {pick:d.main,conf:d.conf}
}

// ===== GLOBAL PATTERN =====
const patterns=[
["PPBPP","P",0.78],
["BBPBB","B",0.77],
["PBPBP","B",0.65],
["BPBPB","P",0.66]
]

function globalAI(){
  if(history.length<5) return {pick:"-",conf:0}
  let recent=history.slice(-5).join("")
  let best={score:0}

  patterns.forEach(p=>{
    let sim=[...recent].filter((x,i)=>x===p[0][i]).length/5
    let score=sim*p[2]
    if(score>best.score){
      best={pick:p[1],conf:50+score*50}
    }
  })
  return best
}

// ===== ADAPTIVE =====
function adaptive(d){
  let trend=Math.abs(d.sP-d.sB)*120
  let momentum=Math.abs(d.mom)*100
  let stability=(1-d.vol)*100
  let chaos=d.ent*70

 

  if(momentum>60 && trend>55) return {pick:d.main,conf:85}
  if(trend<35) return {pick:d.alt,conf:70}

  return {pick:d.main,conf:75}
}

// ===== HYBRID =====
function hybrid(d,g){

  // 🔥 ถ้า global ยังไม่พร้อม → ใช้ main
  if(!g.pick || g.pick === "-" || g.conf < 55){
    return {pick:d.main, conf:d.conf}
  }

  // 🔥 ถ้าตรงกัน → บูสต์ความมั่นใจ
  if(d.main === g.pick){
    return {
      pick:d.main,
      conf:Math.min(99,(d.conf+g.conf)/2 + 8)
    }
  }

  // 🔥 ถ้าไม่ตรง → เลือกตัวที่มั่นใจกว่า
  return (g.conf > d.conf)
    ? {pick:g.pick, conf:g.conf}
    : {pick:d.main, conf:d.conf}
}

function getHotFromDOM(){

  let hotList = []

  // 🔥 เอาเฉพาะ "ตัวที่กระพริบจริง"
  document.querySelectorAll(
    '#aiStats .topAI.blinkHigh, #aiStats .topAI.blinkMid'
  ).forEach(el=>{

    let nameEl = el.querySelector('.aiName')
    let pickEl = el.querySelector('.aiPick')

    if(!nameEl || !pickEl) return

    let name = nameEl.innerText.trim()
    let pick = pickEl.innerText.trim()

    // เอาเฉพาะ P/B
    if(pick !== "P" && pick !== "B") return

    // 🔥 ระดับความแรง
    let level = "⚡"
    if(el.classList.contains('blinkHigh')) level = "🔥"

    hotList.push({
      name,
      pick,
      level
    })
  })

  return hotList
}

function getRealHotAI(){

  let result = []
  let minSample = 2

  // หา winrate ของทุกสาย
  let stats = {}

  Object.keys(aiTracks).forEach(key=>{
    let arr = aiTracks[key]
    let win = arr.filter(x=>x===1).length
    let total = arr.length

    let pct = (total >= minSample)
      ? (win/total)*100
      : 0

    stats[key] = {
      pct,
      total
    }
  })

  // หา max
  let max = 0
  Object.values(stats).forEach(s=>{
    if(s.pct > max && s.total >= minSample){
      max = s.pct
    }
  })

  // ดึงตัวที่เป็น TOP
  Object.keys(stats).forEach(key=>{
    let s = stats[key]

    if(s.total >= minSample && s.pct === max){

      let pick = prevAI?.[key]

      if(pick === "P" || pick === "B"){
        result.push({
          name: key.toUpperCase(),
          pick,
          level: "🔥"
        })
      }
    }
  })

  return result
}

function millionAI(){

  if(history.length<6) return {pick:"-",conf:0}

  let recent=history.slice(-6).join("")
  let hash=0

  for(let i=0;i<recent.length;i++){
    hash=(hash*31 + recent.charCodeAt(i)) % 997
  }

  let pseudoP = hash % 100
  let pseudoB = 100 - pseudoP

  let pick = pseudoP >= pseudoB ? "P" : "B"
  let winrate = Math.max(pseudoP,pseudoB)/100

  let conf = Math.min(99, Math.round(50 + winrate*50))

  return {pick,conf}
}

function drawBeadRoad(){

  const board = document.getElementById("board")
  board.innerHTML = ""

  let cols = []
  let col = 0
  let row = 0

  history.forEach((x)=>{

    // วางทุกตัวเหมือนกัน (P / B / T)
    cols[col] = cols[col] || []
    cols[col][row] = [x]

    row++

    // ครบ 6 แถว → ขึ้นคอลัมน์ใหม่
    if(row >= 6){
      row = 0
      col++
    }

  })

  // ===== render =====
  cols.forEach((c)=>{
    for(let r=0;r<6;r++){

      let div = document.createElement("div")

      if(c && c[r]){
        div.className = "cell " + c[r][0]
      }else{
        div.className = "cell"
        div.style.opacity = "0.08"
      }

      board.appendChild(div)
    }
  })
}

// ===== UI =====
function add(x){history.push(x);update()}

function undo(){

  if(!history.length) return

  // ลบตัวล่าสุด
  history.pop()

  // 🔥 reset AI state ทั้งหมด
  Object.keys(aiTracks).forEach(k=> aiTracks[k]=[])
  Object.keys(aiPicks).forEach(k=> aiPicks[k]=[])

  prevAI = null

  // 🔥 replay ใหม่จาก history ที่เหลือ
  let old = [...history]
  history = []

  isReplaying = true

  old.forEach(x=>{
    history.push(x)
    update()
  })

  isReplaying = false

  // 🔥 บังคับ refresh UI รอบสุดท้าย
  update()
}

function clearAll(){

  // 🔥 reset data
  history = []
  prevAI = null

  Object.keys(aiTracks).forEach(k=>{
    aiTracks[k] = []
  })

  Object.keys(aiPicks).forEach(k=>{
    aiPicks[k] = []
  })

  // 🔥 ล้าง UI ทุกจุด
  document.getElementById("board").innerHTML = ""
  document.getElementById("aiStats").innerHTML = ""
  document.getElementById("summaryBox").innerHTML = ""

  // 🔥 กันเอียงค้าง (force render state ว่าง)
  update()
}

function pushResult(key, pick, real){

  if(!pick || pick==="-" || real==="T") return

  let arr = aiTracks[key]

  arr.push(pick === real ? 1 : 0)

  if(arr.length > 100) arr.shift()
}

function pushPick(key, pick){
  if(!pick || pick==="-" || pick==="งดแทง") return

  let arr = aiPicks[key]
  arr.push(pick)

  if(arr.length > 100) arr.shift()
}

function renderSummary(){

  let total = history.length

  let p = history.filter(x=>x==='P').length
  let b = history.filter(x=>x==='B').length
  let t = history.filter(x=>x==='T').length

  let pPct = total ? Math.round((p/total)*100) : 0
  let bPct = total ? Math.round((b/total)*100) : 0
  let tPct = total ? Math.round((t/total)*100) : 0

  let bias = Math.abs(pPct - bPct)

  let trend = "-"
  if(pPct > bPct) trend = "🔵 PLAYER นำ"
  else if(bPct > pPct) trend = "🔴 BANKER นำ"
  else trend = "⚖️ สูสี"

  if(bias >= 20) trend += " 🔥 (เอียงหนัก)"
  else if(bias >= 10) trend += " ⚡ (เริ่มเอียง)"
  let conditionHTML = ""


  // ===== render =====
  
  document.getElementById("summaryBox").innerHTML = `
    <div class="aiCard">

      <div class="aiHeader">
        <div class="aiName">📊 TABLE STATS</div>
        <div>${trend}</div>
      </div>
      
      

     <div style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
margin-bottom:10px;
font-size:12px;
">

  <div class="aiCard">
    🔵 P<br><b>${p}</b>
  </div>

  <div class="aiCard">
    🔴 B<br><b>${b}</b>
  </div>

  <div class="aiCard">
    🟢 T<br><b>${t}</b>
  </div>

  <div class="aiCard">
    📊 Total<br><b>${total}</b>
  </div>

</div>

      <div class="bar">
        <div class="barFill" style="width:${pPct}%"></div>
      </div>
      <div style="font-size:11px;">Player %</div>

      <div class="bar">
        <div class="barFill" style="width:${bPct}%"></div>
      </div>
      <div style="font-size:11px;">Banker %</div>

      <div style="margin-top:10px; font-size:13px; line-height:1.6;">
        ${conditionHTML}
      </div>

    </div>
  `
}

function renderAIStats(current){
  const box = document.getElementById("aiStats")
  let html=""
  let minSample = 2
  let maxPct = 0

  // หา % สูงสุด
  Object.keys(aiTracks).forEach(key=>{
    let arr = aiTracks[key]
    let win = arr.filter(x=>x===1).length
    let total = arr.length
    let pct = (total>=minSample) ? Math.round((win/total)*100) : 0
    if(pct > maxPct) maxPct = pct
  })

  // render card
  Object.keys(aiTracks).forEach(key=>{
    let arr = aiTracks[key]
    let pick = current[key] || "-"
    let win = arr.filter(x=>x===1).length
    let total = arr.length
    let pct = (total>=minSample) ? Math.round((win/total)*100) : 0

    // ===== DOT =====
    let last25 = arr.slice(-25)
    while(last25.length < 25) last25.unshift(null)
    let dots=""
    last25.forEach(v=>{
      if(v === null){
        dots += `<span class="mark" style="opacity:.1">•</span>`
      }else{
        dots += v
          ? `<span class="mark winMark">✔</span>`
          : `<span class="mark lossMark">✖</span>`
      }
    })

    // ===== PICKS =====
    let picks = aiPicks[key].slice(-20)
    let pickDots = ""
    picks.forEach(p=>{
      let color = p==="P" ? "#4da3ff" : "#ff5c5c"
      pickDots += `<span class="dot" style="background:${color}"></span>`
    })

    // ===== สี =====
    let pickClass = pick==="P" ? "pickP" : "pickB"

    // 🔥 กระพริบเฉพาะสาย WINRATE สูงสุด
    let topClass = (pct === maxPct && total >= 2) ? "topAI blinkHigh" : "topAI"

    html += `
      <div class="aiCard ${topClass}">
        <div class="aiHeader">
          <div class="aiName">${key.toUpperCase()}</div>
          <div class="aiPick ${pickClass}">${pick}</div>
        </div>

        <div class="bar">
          <div class="barFill" style="width:${pct}%"></div>
        </div>

        <div class="winrateText">
          WINRATE: ${pct}% (${win}/${total})
        </div>

        <div class="dotRow">${dots}</div>
        <div class="pickRow">${pickDots}</div>
      </div>
    `
  })

  box.innerHTML = html

  // 🔥 FORCE RE-ANIMATE
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      document.querySelectorAll('.topAI').forEach(el=>{
        const isHigh = el.classList.contains('blinkHigh')
        const isMid = el.classList.contains('blinkMid')
        el.classList.remove('blinkHigh','blinkMid')
        void el.offsetWidth
        if(isHigh) el.classList.add('blinkHigh')
        else if(isMid) el.classList.add('blinkMid')
      })
    })
  })
}

function renderPickSummary(current){

  let pList = []
  let bList = []

  Object.keys(current).forEach(key=>{
    let pick = current[key]

    if(pick === "P") pList.push(key.toUpperCase())
    if(pick === "B") bList.push(key.toUpperCase())
  })

  let html = `
  <div class="aiCard" style="margin-top:10px;">

    <div class="aiHeader">
      <div class="aiName">🎯 AI PICK SUMMARY</div>
    </div>

    <div style="font-size:13px; margin-top:6px;">
      🔵 P = <b>${pList.length}</b> สาย<br>
      🔴 B = <b>${bList.length}</b> สาย
    </div>

    <div style="margin-top:8px; font-size:12px;">
      🔵 P: ${pList.join(", ") || "-"}<br>
      🔴 B: ${bList.join(", ") || "-"}
    </div>

  </div>
  `

  document.getElementById("summaryBox").innerHTML += html
}


function update(){

  drawBeadRoad()
  renderSummary()   // 🔥 เพิ่มบรรทัดนี้

  let last = history.at(-1)

  // ===== [1] เช็คผลก่อน (ใช้ prevAI) =====
  if(!isReplaying && prevAI && history.length >= 2 && last !== "T"){

    pushResult("main", prevAI.main, last)
    pushResult("ultimate", prevAI.ultimate, last)
    pushResult("final", prevAI.final, last)
    pushResult("global", prevAI.global, last)
    pushResult("adaptive", prevAI.adaptive, last)
    pushResult("hybrid", prevAI.hybrid, last)
    pushResult("million", prevAI.million, last)

    pushPick("main", prevAI.main)
    pushPick("ultimate", prevAI.ultimate)
    pushPick("final", prevAI.final)
    pushPick("global", prevAI.global)
    pushPick("adaptive", prevAI.adaptive)
    pushPick("hybrid", prevAI.hybrid)
    pushPick("million", prevAI.million)
  }

  // ===== [2] คำนวณ AI "หลังจากเช็คผลแล้ว" =====
  let d = hyper()
  let u = ultimate(d)
  let f = finalDecision(d,u)
  let g = globalAI()
  let a = adaptive(d)
  let h = hybrid(d,g)
  let m = millionAI()

  // 🔥🔥🔥 เพิ่มตรงนี้ (กันค่าค้าง)
  let pCount = 0
  let bCount = 0


  // ===== [3] bootstrap ครั้งแรก =====
  if(!prevAI && history.length >= 1){
    prevAI = {
      main: d.main,
      ultimate: u.pick,
      final: f.pick,
      global: g.pick,
      adaptive: a.pick,
      hybrid: h.pick,
      million: m.pick
    }
    return
  }

  // ===== [4] เซฟรอบนี้ =====
  prevAI = {
    main: d.main,
    ultimate: u.pick,
    final: f.pick,
    global: g.pick,
    adaptive: a.pick,
    hybrid: h.pick,
    million: m.pick
  }

  // ===== [5] render =====
  
renderAIStats({
  main: d.main,
  ultimate: u.pick,
  final: f.pick,
  global: g.pick,
  adaptive: a.pick,
  hybrid: h.pick,
  million: m.pick
})


}
